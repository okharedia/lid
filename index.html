<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>LiD // Trainer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="tabler-filter" viewBox="0 0 24 24">
        <path d="M4 4h16l-6 7v5l-4 3v-8z"></path>
      </symbol>
      <symbol id="tabler-arrows-shuffle" viewBox="0 0 24 24">
        <path d="M18 4l3 3l-3 3"></path>
        <path d="M18 20l3 -3l-3 -3"></path>
        <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 0 5 5h5"></path>
        <path d="M21 7h-5a4.98 4.98 0 0 0 -4 2"></path>
        <path d="M3 17h3a4.98 4.98 0 0 0 4 -2"></path>
      </symbol>
      <symbol id="tabler-arrow-left" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
        <path d="M5 12l6 6"></path>
        <path d="M5 12l6 -6"></path>
      </symbol>
      <symbol id="tabler-arrow-right" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
        <path d="M13 18l6 -6"></path>
        <path d="M13 6l6 6"></path>
      </symbol>
      <symbol id="tabler-star" viewBox="0 0 24 24">
        <path d="M12 17.75l-6.172 3.245l1.179 -6.873l-4.993 -4.867l6.9 -1.003l3.086 -6.252l3.086 6.252l6.9 1.003l-4.993 4.867l1.179 6.873z"></path>
      </symbol>
      <symbol id="tabler-sparkle-2" viewBox="0 0 24 24">
        <path d="M12 3l2.15 5.85l5.85 2.15l-5.85 2.15l-2.15 5.85l-2.15 -5.85l-5.85 -2.15l5.85 -2.15z"></path>
      </symbol>
      <symbol id="tabler-check" viewBox="0 0 24 24">
        <path d="M5 12l5 5l10 -10"></path>
      </symbol>
      <symbol id="tabler-circle-check" viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0 -20" fill="currentColor" stroke="none"></path>
        <path d="M7.5 12.5l3 3l6 -7" stroke="#fff"></path>
      </symbol>
      <symbol id="tabler-x" viewBox="0 0 24 24">
        <path d="M18 6l-12 12"></path>
        <path d="M6 6l12 12"></path>
      </symbol>
      <symbol id="tabler-trash" viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
        <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"></path>
        <path d="M9 7v-3h6v3"></path>
      </symbol>
      <symbol id="tabler-refresh" viewBox="0 0 24 24">
        <path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"></path>
        <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path>
      </symbol>
      <symbol id="tabler-trophy" viewBox="0 0 24 24">
        <path d="M8 21h8"></path>
        <path d="M12 17v4"></path>
        <path d="M7 4h10v6a5 5 0 0 1 -10 0z"></path>
        <path d="M5 5h-2v3a4 4 0 0 0 4 4"></path>
        <path d="M19 5h2v3a4 4 0 0 1 -4 4"></path>
      </symbol>
      <symbol id="tabler-confetti" viewBox="0 0 24 24">
        <path d="M4 5h2"></path>
        <path d="M5 4v2"></path>
        <path d="M11.5 4l.5 2"></path>
        <path d="M18 5h2"></path>
        <path d="M19 4v2"></path>
        <path d="M15 10l4 4"></path>
        <path d="M4 20l6.5 -6.5"></path>
        <path d="M4 20l4 -11l7 7z"></path>
      </symbol>
      <symbol id="tabler-adjustments-horizontal" viewBox="0 0 24 24">
        <path d="M4 6h7"></path>
        <path d="M15 6h5"></path>
        <path d="M12 4v4"></path>
        <path d="M4 12h3"></path>
        <path d="M11 12h9"></path>
        <path d="M8 10v4"></path>
        <path d="M4 18h9"></path>
        <path d="M17 18h3"></path>
        <path d="M14 16v4"></path>
      </symbol>
      <symbol id="tabler-minus" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-arrow-back-up" viewBox="0 0 24 24">
        <path d="M9 14l-4 -4l4 -4"></path>
        <path d="M5 10h11a4 4 0 1 1 0 8h-1"></path>
      </symbol>
      <symbol id="tabler-language" viewBox="0 0 24 24">
        <path d="M4 5h7"></path>
        <path d="M9 3v2c0 4.418 -2.239 8 -5 8"></path>
        <path d="M5 9c0 2.144 2.952 3.908 6.7 4"></path>
        <path d="M12 20l4 -9l4 9"></path>
        <path d="M19.1 18h-6.2"></path>
      </symbol>
      <symbol id="tabler-info-circle" viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0 -20"></path>
        <path d="M12 8h.01"></path>
        <path d="M11 12h1v4h1"></path>
      </symbol>
      <symbol id="tabler-book" viewBox="0 0 24 24">
        <path d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6v13"></path>
        <path d="M12 6v13"></path>
        <path d="M21 6v13"></path>
      </symbol>
      <symbol id="tabler-repeat" viewBox="0 0 24 24">
        <path d="M4 12v-3a3 3 0 0 1 3 -3h13"></path>
        <path d="M17 3l3 3l-3 3"></path>
        <path d="M20 12v3a3 3 0 0 1 -3 3h-13"></path>
        <path d="M7 21l-3 -3l3 -3"></path>
      </symbol>
    </svg>
    <main class="bp-app" aria-live="polite">
      <header class="bp-top">
        <span class="brand">
          <span class="flag" aria-hidden="true"></span>
        </span>
        <div class="bp-top-actions">
          <label class="bp-language" aria-label="Translation language">
            <svg class="icon" aria-hidden="true"><use href="#tabler-language"></use></svg>
            <select id="languageSelect" aria-label="Translation language">
              <option value="en" selected>EN</option>
              <option value="es" disabled>ES</option>
              <option value="fr" disabled>FR</option>
            </select>
          </label>
          <button id="filterButton" class="bp-filter-toggle" type="button" aria-label="Toggle filters" aria-expanded="false" aria-controls="filterBar">
            <svg class="icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span id="filterButtonLabel" class="sr-only">Options</span>
          </button>
          <button id="shuffleButton" class="bp-shuffle-toggle" type="button" aria-pressed="false" aria-label="Shuffle" title="Shuffle deck">
            <svg class="icon" aria-hidden="true"><use href="#tabler-arrows-shuffle"></use></svg>
          </button>
          <span class="bp-mode" role="group" aria-label="Mode">
            <button id="learnMode" type="button" aria-pressed="true">Learn</button>
            <button id="testMode" type="button" aria-pressed="false">Test</button>
          </span>
        </div>
      </header>

      <section id="filterBar" class="bp-pills-bar" aria-label="Review panel">
        <div class="panel-tabs" role="tablist" aria-label="Review panel">
          <button id="filtersTab" type="button" aria-pressed="true">Filters</button>
          <button id="knownTab" type="button" aria-pressed="false">Known</button>
          <button id="testConfigTab" type="button" aria-pressed="false">Test</button>
        </div>
        <div id="filtersPane" class="panel-pane">
          <div id="categoryPills" class="pills"></div>
        </div>
        <div id="knownPane" class="panel-pane" hidden>
          <div id="knownSummary" class="known-summary"></div>
          <div id="knownList" class="known-list"></div>
        </div>
        <div id="testConfigPane" class="panel-pane" hidden>
          <div class="test-config">
            <label for="testSizeInput">Questions per test</label>
            <div class="test-size-control">
              <button id="testSizeMinus" type="button" aria-label="Decrease test count">
                <svg class="icon" aria-hidden="true"><use href="#tabler-minus"></use></svg>
              </button>
              <input id="testSizeInput" type="number" min="1" max="310" step="1" inputmode="numeric" aria-label="Questions per test" />
              <button id="testSizePlus" type="button" aria-label="Increase test count">
                <svg class="icon" aria-hidden="true"><use href="#tabler-plus"></use></svg>
              </button>
            </div>
            <div id="testSizeMeta" class="test-size-meta"></div>
          </div>
        </div>
      </section>

      <div class="bp-track" aria-hidden="true">
        <div id="progressFill" class="fill"></div>
      </div>

      <section id="card" class="bp-card">
        <div class="bp-q-label">
          <span id="questionTag" class="tag">FRAGE 001</span>
          <span id="categoryLabel">Alle Kategorien</span>
          <span id="knownTag" class="known-tag" hidden><svg class="icon" aria-hidden="true"><use href="#tabler-check"></use></svg> KNOWN</span>
          <span class="grow"></span>
          <span id="feedback" class="bp-feedback" hidden></span>
          <span id="knownCount" class="bp-known" hidden><svg class="icon check" aria-hidden="true"><use href="#tabler-check"></use></svg> 0</span>
          <span id="progressText" class="progress">01<span class="pct">/310</span></span>
        </div>

        <div id="questionChips" class="bp-q-chips"></div>

        <h1 id="questionText" class="bp-q">Loading...</h1>
        <p id="questionTranslation" class="bp-q-en"></p>
        <img id="questionImage" class="bp-image" alt="Official question image" />
        <p id="imageCaption" class="bp-image-caption" hidden></p>

        <ul id="answers" class="bp-answers"></ul>

        <div id="lockedHint" class="bp-locked" hidden>— answer to reveal explanation &amp; keywords —</div>
      </section>

      <aside id="clusterDrawer" class="bp-cluster-drawer" hidden aria-labelledby="clusterDrawerTitle" role="dialog">
        <header>
          <h2 id="clusterDrawerTitle"></h2>
          <button id="clusterDrawerClose" type="button" aria-label="Close cheat sheet">
            <svg class="icon" aria-hidden="true"><use href="#tabler-x"></use></svg>
          </button>
        </header>
        <div id="clusterDrawerBody" class="bp-cluster-body"></div>
      </aside>

      <div id="emptyState" class="bp-empty" hidden>
        <div class="big">No cards</div>
        <div>try a different category</div>
      </div>

      <section id="resultView" class="bp-result" hidden></section>

      <div id="studyDock" class="bp-study-dock" hidden>
        <p id="hintText" class="bp-hint"></p>
        <div id="keywordList" class="bp-kw-list"></div>
        <p id="glossaryContext" class="bp-glossary-context" hidden></p>
      </div>

      <nav id="cardNav" class="bp-nav" aria-label="Card navigation">
        <button id="prevButton" type="button" aria-label="Previous">
          <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-left"></use></svg> Prev
        </button>
        <button id="middleButton" class="known-btn" type="button"><svg class="icon" aria-hidden="true"><use href="#tabler-star"></use></svg> Mark known</button>
        <button id="nextButton" type="button">
          Next <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-right"></use></svg>
        </button>
      </nav>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
