    <main class="bp-app is-loading" aria-live="polite">
      <header class="bp-top">
        <span class="brand">
          <button id="filterButton" class="bp-filter-toggle" type="button" aria-label="Toggle filters" aria-expanded="false" aria-controls="filterBar">
            <svg class="icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span id="filterButtonLabel" class="sr-only">Options</span>
          </button>
          <span class="flag" aria-hidden="true"></span>
        </span>
        <div class="bp-top-actions">
          <label class="bp-language" aria-label="Translation language">
            <svg class="icon" aria-hidden="true"><use href="#tabler-language"></use></svg>
            <select id="languageSelect" aria-label="Translation language">
              <option value="en" selected>EN</option>
              <option value="es" disabled>ES</option>
              <option value="fr" disabled>FR</option>
            </select>
          </label>
          <button id="shuffleButton" class="bp-shuffle-toggle" type="button" aria-pressed="false" aria-label="Shuffle" title="Shuffle deck">
            <svg class="icon" aria-hidden="true"><use href="#tabler-arrows-shuffle"></use></svg>
          </button>
          <span class="bp-mode" role="group" aria-label="Mode">
            <button id="learnMode" type="button" aria-pressed="true">Learn</button>
            <button id="testMode" type="button" aria-pressed="false">Test</button>
          </span>
        </div>
      </header>

      <section id="filterBar" class="bp-pills-bar" aria-label="Review panel" tabindex="-1">
        <div class="panel-tabs" role="tablist" aria-label="Review panel">
          <button id="filtersTab" type="button" role="tab" aria-selected="true" aria-controls="filtersPane">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span class="tab-label">Filters</span>
          </button>
          <button id="knownTab" type="button" role="tab" aria-selected="false" aria-controls="knownPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-list-check"></use></svg>
            <span class="tab-label">Known</span>
          </button>
          <button id="testConfigTab" type="button" role="tab" aria-selected="false" aria-controls="testConfigPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-settings"></use></svg>
            <span class="tab-label">Config</span>
          </button>
        </div>
        <div id="filtersPane" class="panel-pane" role="tabpanel" aria-labelledby="filtersTab">
          <div id="categoryPills" class="pills"></div>
        </div>
        <div id="knownPane" class="panel-pane" role="tabpanel" aria-labelledby="knownTab" hidden>
          <div id="knownSummary" class="known-summary"></div>
          <div id="knownList" class="known-list"></div>
        </div>
        <div id="testConfigPane" class="panel-pane" role="tabpanel" aria-labelledby="testConfigTab" hidden>
          <div class="test-config">
            <div class="config-section">
              <label for="testSizeInput">Questions per test</label>
              <div class="test-size-control">
                <button id="testSizeMinus" type="button" aria-label="Decrease test count">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-minus"></use></svg>
                </button>
                <input id="testSizeInput" type="number" min="1" max="310" step="1" inputmode="numeric" aria-label="Questions per test" />
                <button id="testSizePlus" type="button" aria-label="Increase test count">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-plus"></use></svg>
                </button>
              </div>
              <div id="testSizeMeta" class="test-size-meta"></div>
            </div>
            <div class="config-section">
              <div class="config-label">Theme</div>
              <div class="theme-control" role="group" aria-label="Theme preference">
                <button id="themeSystem" type="button" data-theme-choice="system" aria-pressed="true">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-device-desktop"></use></svg>
                  System
                </button>
                <button id="themeLight" type="button" data-theme-choice="light" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-sun"></use></svg>
                  Light
                </button>
                <button id="themeDark" type="button" data-theme-choice="dark" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-moon"></use></svg>
                  Dark
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="bp-track" role="progressbar" aria-label="Question progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="progressFill" class="fill"></div>
      </div>

      <section id="card" class="bp-card" aria-busy="true">
        <div class="bp-q-label">
          <span id="questionTag" class="tag">FRAGE 001</span>
          <span id="categoryLabel">Alle Kategorien</span>
          <span id="knownTag" class="known-tag" hidden><svg class="icon" aria-hidden="true"><use href="#tabler-check"></use></svg> KNOWN</span>
          <span class="grow"></span>
          <span id="feedback" class="bp-feedback" hidden></span>
          <span id="knownCount" class="bp-known" hidden><svg class="icon check" aria-hidden="true"><use href="#tabler-check"></use></svg> 0</span>
          <span id="progressText" class="progress">01<span class="pct">/310</span></span>
        </div>

        <div id="questionChips" class="bp-q-chips"></div>

        <div id="loadingState" class="bp-loading" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h1 id="questionText" class="bp-q">Loading...</h1>
        <p id="questionTranslation" class="bp-q-en"></p>
        <img id="questionImage" class="bp-image" alt="Official question image" />

        <ul id="answers" class="bp-answers" role="radiogroup" aria-labelledby="questionText"></ul>

        <div id="lockedHint" class="bp-locked" hidden>— answer to reveal explanation &amp; keywords —</div>
      </section>

      <div id="emptyState" class="bp-empty" hidden>
        <svg class="icon" aria-hidden="true"><use href="#tabler-book"></use></svg>
        <div class="big">No cards</div>
        <div>try a different category</div>
      </div>

      <section id="resultView" class="bp-result" hidden></section>

      <div id="studyDock" class="bp-study-dock" role="region" aria-label="Study help" hidden>
        <button
          id="studyHandle"
          class="bp-study-handle"
          type="button"
          aria-label="Collapse study help"
          aria-expanded="true"
          aria-controls="studyContent"
        ></button>
        <div id="studyContent" class="bp-study-content">
          <p id="hintText" class="bp-hint"></p>
          <div id="keywordList" class="bp-kw-list"></div>
        </div>
      </div>

      <nav id="cardNav" class="bp-nav" aria-label="Card navigation">
        <button id="prevButton" type="button" aria-label="Previous">
          <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-left"></use></svg> Prev
        </button>
        <button id="middleButton" class="known-btn" type="button"><svg class="icon" aria-hidden="true"><use href="#tabler-star"></use></svg> Mark known</button>
        <button id="nextButton" type="button">
          Next <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-right"></use></svg>
        </button>
      </nav>
    </main>

    <script src="./app.js?v=md3-ai-icon"></script>
  </body>
</html>
