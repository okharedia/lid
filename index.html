<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>LiD // Trainer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

        <path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path>

      </symbol>
      <symbol id="tabler-confetti" viewBox="0 0 24 24">
        <path d="M4 5h2"></path>
        <path d="M5 4v2"></path>
        <path d="M11.5 4l.5 2"></path>
        <path d="M18 5h2"></path>
        <path d="M19 4v2"></path>
        <path d="M15 10l4 4"></path>
        <path d="M4 20l6.5 -6.5"></path>
        <path d="M4 20l4 -11l7 7z"></path>
      </symbol>
      <symbol id="tabler-adjustments-horizontal" viewBox="0 0 24 24">
        <path d="M4 6h7"></path>
        <path d="M15 6h5"></path>
        <path d="M12 4v4"></path>
        <path d="M4 12h3"></path>
        <path d="M11 12h9"></path>
        <path d="M8 10v4"></path>
        <path d="M4 18h9"></path>
        <path d="M17 18h3"></path>
        <path d="M14 16v4"></path>
      </symbol>
      <symbol id="tabler-list-check" viewBox="0 0 24 24">
        <path d="M11 6h9"></path>
        <path d="M11 12h9"></path>
        <path d="M11 18h9"></path>
        <path d="M4 6l1 1l3 -3"></path>
        <path d="M4 12l1 1l3 -3"></path>
        <path d="M4 18l1 1l3 -3"></path>
      </symbol>
      <symbol id="tabler-settings" viewBox="0 0 24 24">
        <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c.996 .608 2.296 .07 2.572 -1.065z"></path>

      </symbol>
      <symbol id="tabler-minus" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-arrow-back-up" viewBox="0 0 24 24">
        <path d="M9 14l-4 -4l4 -4"></path>
        <path d="M5 10h11a4 4 0 1 1 0 8h-1"></path>
      </symbol>
      <symbol id="tabler-language" viewBox="0 0 24 24">
        <path d="M4 5h7"></path>
        <path d="M9 3v2c0 4.418 -2.239 8 -5 8"></path>
        <path d="M5 9c0 2.144 2.952 3.908 6.7 4"></path>
        <path d="M12 20l4 -9l4 9"></path>
        <path d="M19.1 18h-6.2"></path>
      </symbol>
      <symbol id="tabler-device-desktop" viewBox="0 0 24 24">
        <path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"></path>
        <path d="M8 21h8"></path>
        <path d="M12 16v5"></path>
      </symbol>
      <symbol id="tabler-sun" viewBox="0 0 24 24">
        <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
        <path d="M3 12h1"></path>
        <path d="M20 12h1"></path>

        <path d="M12 20v1"></path>
        <path d="M5.6 5.6l.7 .7"></path>
        <path d="M17.7 17.7l.7 .7"></path>

        <path d="M6.3 17.7l-.7 .7"></path>
      </symbol>
      <symbol id="tabler-moon" viewBox="0 0 24 24">
        <path d="M12 3c.132 0 .263 .003 .393 .009a7.5 7.5 0 0 0 7.598 10.598a9 9 0 1 1 -7.991 -10.607z"></path>
      </symbol>
      <symbol id="tabler-book" viewBox="0 0 24 24">
        <path d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6v13"></path>
        <path d="M12 6v13"></path>
        <path d="M21 6v13"></path>
      </symbol>
      <symbol id="tabler-repeat" viewBox="0 0 24 24">
        <path d="M4 12v-3a3 3 0 0 1 3 -3h13"></path>
        <path d="M17 3l3 3l-3 3"></path>
        <path d="M20 12v3a3 3 0 0 1 -3 3h-13"></path>
        <path d="M7 21l-3 -3l3 -3"></path>
      </symbol>
    </svg>
    <main class="bp-app is-loading" aria-live="polite">
      <header class="bp-top">
        <span class="brand">
          <button id="filterButton" class="bp-filter-toggle" type="button" aria-label="Toggle filters" aria-expanded="false" aria-controls="filterBar" data-i18n-aria-label="ui.aria.toggleFilters">
            <svg class="icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span id="filterButtonLabel" class="sr-only" data-i18n="ui.action.options">Options</span>
          </button>
          <span class="flag" aria-hidden="true"></span>
        </span>
        <div class="bp-top-actions">
          <label class="bp-language" aria-label="Translation language" data-i18n-aria-label="ui.aria.translationLanguage">
            <svg class="icon" aria-hidden="true"><use href="#tabler-language"></use></svg>
            <select id="languageSelect" aria-label="Translation language" data-i18n-aria-label="ui.aria.translationLanguage">
              <option value="en" selected data-i18n="ui.language.en">EN</option>
              <option value="es" disabled data-i18n="ui.language.es">ES</option>
              <option value="fr" disabled data-i18n="ui.language.fr">FR</option>
            </select>
          </label>
          <span class="bp-mode" role="group" aria-label="Mode" data-i18n-aria-label="ui.aria.mode">
            <button id="learnMode" type="button" aria-pressed="true" data-i18n="ui.mode.learn">Learn</button>
            <button id="testMode" type="button" aria-pressed="false" data-i18n="ui.mode.test">Test</button>
          </span>
        </div>
      </header>

      <section id="filterBar" class="bp-pills-bar" aria-label="Review panel" tabindex="-1" data-i18n-aria-label="ui.aria.reviewPanel">
        <div class="panel-tabs" role="tablist" aria-label="Review panel" data-i18n-aria-label="ui.aria.reviewPanel">
          <button id="filtersTab" type="button" role="tab" aria-selected="true" aria-controls="filtersPane">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span class="tab-label" data-i18n="ui.tab.filters">Filters</span>
          </button>
          <button id="knownTab" type="button" role="tab" aria-selected="false" aria-controls="knownPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-star"></use></svg>
            <span class="tab-label" data-i18n="ui.tab.mastered">Mastered</span>
          </button>
          <button id="testConfigTab" type="button" role="tab" aria-selected="false" aria-controls="testConfigPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-settings"></use></svg>
            <span class="tab-label" data-i18n="ui.tab.config">Config</span>
          </button>
        </div>
        <div id="filtersPane" class="panel-pane" role="tabpanel" aria-labelledby="filtersTab">
          <div id="categoryPills" class="pills"></div>
        </div>
        <div id="knownPane" class="panel-pane" role="tabpanel" aria-labelledby="knownTab" hidden>
          <div id="knownSummary" class="known-summary"></div>
          <div id="knownList" class="known-list"></div>
        </div>
        <div id="testConfigPane" class="panel-pane" role="tabpanel" aria-labelledby="testConfigTab" hidden>
          <div class="test-config">
            <div class="config-section">
              <label for="testSizeInput" data-i18n="ui.test.questionsPerTest">Questions per test</label>
              <div class="test-size-control">
                <button id="testSizeMinus" type="button" aria-label="Decrease test count" data-i18n-aria-label="ui.aria.decreaseTestCount">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-minus"></use></svg>
                </button>
                <input id="testSizeInput" type="number" min="1" max="310" step="1" inputmode="numeric" aria-label="Questions per test" data-i18n-aria-label="ui.test.questionsPerTest" />
                <button id="testSizePlus" type="button" aria-label="Increase test count" data-i18n-aria-label="ui.aria.increaseTestCount">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-plus"></use></svg>
                </button>
              </div>
              <div id="testSizeMeta" class="test-size-meta"></div>
            </div>
            <label class="settings-switch-row" for="testTranslationsToggle">
              <span class="settings-copy">
                <span id="testTranslationsTitle" class="settings-title" data-i18n="ui.test.showTranslations">Show translations in tests</span>
                <span id="testTranslationsSupport" class="settings-support" data-i18n="ui.test.translationSupport">Question and answer translations</span>
              </span>
              <span class="md-switch">
                <input
                  id="testTranslationsToggle"
                  type="checkbox"
                  role="switch"
                  aria-labelledby="testTranslationsTitle"
                  aria-describedby="testTranslationsSupport"
                />
                <span class="md-switch-track" aria-hidden="true">
                  <span class="md-switch-handle">
                    <svg class="icon switch-icon" aria-hidden="true"><use href="#tabler-check"></use></svg>
                  </span>
                </span>
              </span>
            </label>
            <label class="settings-switch-row" for="testImmediateFeedbackToggle">
              <span class="settings-copy">
                <span id="testImmediateFeedbackTitle" class="settings-title" data-i18n="ui.test.showImmediateFeedback">Show feedback while testing</span>
                <span id="testImmediateFeedbackSupport" class="settings-support" data-i18n="ui.test.immediateFeedbackSupport">Correct/wrong reveal after each answer</span>
              </span>
              <span class="md-switch">
                <input
                  id="testImmediateFeedbackToggle"
                  type="checkbox"
                  role="switch"
                  aria-labelledby="testImmediateFeedbackTitle"
                  aria-describedby="testImmediateFeedbackSupport"
                  checked
                />
                <span class="md-switch-track" aria-hidden="true">
                  <span class="md-switch-handle">
                    <svg class="icon switch-icon" aria-hidden="true"><use href="#tabler-check"></use></svg>
                  </span>
                </span>
              </span>
            </label>
            <div class="config-section">
              <div class="config-label" data-i18n="ui.theme.label">Theme</div>
              <div class="theme-control" role="group" aria-label="Theme preference" data-i18n-aria-label="ui.aria.themePreference">
                <button id="themeSystem" type="button" data-theme-choice="system" aria-pressed="true">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-device-desktop"></use></svg>
                  <span data-i18n="ui.theme.system">System</span>
                </button>
                <button id="themeLight" type="button" data-theme-choice="light" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-sun"></use></svg>
                  <span data-i18n="ui.theme.light">Light</span>
                </button>
                <button id="themeDark" type="button" data-theme-choice="dark" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-moon"></use></svg>
                  <span data-i18n="ui.theme.dark">Dark</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="bp-track" role="progressbar" aria-label="Question progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" data-i18n-aria-label="ui.aria.questionProgress">
        <div id="progressFill" class="fill"></div>
      </div>

      <section id="card" class="bp-card" aria-busy="true">
        <div class="bp-q-label">
          <span id="questionTag" class="tag"></span>
          <span id="categoryLabel"></span>
          <span id="knownTag" class="known-tag" hidden><svg class="icon" aria-hidden="true"><use href="#tabler-check"></use></svg> <span data-i18n="ui.tab.mastered">Mastered</span></span>
          <span class="grow"></span>
          <span id="feedback" class="bp-feedback" hidden></span>
          <span id="knownCount" class="bp-known" hidden><svg class="icon mastered-icon" aria-hidden="true"><use href="#tabler-star"></use></svg> 0</span>
          <button id="progressText" class="progress" type="button" aria-label="Jump to question" data-i18n-aria-label="ui.aria.jumpToQuestion">01<span class="pct">/310</span></button>
        </div>

        <div id="questionChips" class="bp-q-chips"></div>

        <div id="loadingState" class="bp-loading" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h1 id="questionText" class="bp-q" data-i18n="ui.loading">Loading...</h1>
        <p id="questionTranslation" class="bp-q-en"></p>
        <img id="questionImage" class="bp-image" alt="Official question image" data-i18n-alt="ui.aria.officialQuestionImage" />

        <ul id="answers" class="bp-answers" role="radiogroup" aria-labelledby="questionText"></ul>

        <div id="lockedHint" class="bp-locked" hidden data-i18n="ui.lockedHint">— answer to reveal explanation &amp; keywords —</div>
      </section>

      <div id="emptyState" class="bp-empty" hidden>
        <svg class="icon" aria-hidden="true"><use href="#tabler-book"></use></svg>
        <div class="big" data-i18n="ui.empty.title">No cards here</div>
        <div data-i18n="ui.empty.body">Try another category or reset mastered cards</div>
      </div>

      <section id="resultView" class="bp-result" tabindex="-1" hidden></section>

      <div id="studyDock" class="bp-study-dock" role="region" aria-label="Study help" hidden data-i18n-aria-label="ui.study.help">
        <button
          id="studyHandle"
          class="bp-study-handle"
          type="button"
          aria-label="Collapse study help"
          data-i18n-aria-label="ui.study.collapse"
          aria-expanded="true"
          aria-controls="studyContent"
        ></button>
        <div id="studyContent" class="bp-study-content">
          <p id="hintText" class="bp-hint"></p>
          <div id="keywordList" class="bp-kw-list"></div>
        </div>
      </div>

      <div id="snackbar" class="bp-snackbar" role="status" aria-live="polite" hidden>
        <span id="snackbarText"></span>
        <button id="snackbarAction" type="button" hidden></button>
      </div>

      <nav id="cardNav" class="bp-nav" aria-label="Card navigation" data-i18n-aria-label="ui.aria.cardNavigation">
        <button id="prevButton" type="button" aria-label="Previous" data-i18n-aria-label="ui.nav.previousQuestion">
          <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-left"></use></svg> <span data-i18n="ui.nav.prev">Prev</span>
        </button>
        <button id="middleButton" class="known-btn" type="button"><svg class="icon" aria-hidden="true"><use href="#tabler-star"></use></svg> <span data-i18n="ui.mastered.mark">Mark as mastered</span></button>
        <button id="nextButton" type="button">
          <span data-i18n="ui.nav.next">Next</span> <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-right"></use></svg>
        </button>
      </nav>

      <dialog id="jumpDialog" class="bp-jump-dialog" aria-labelledby="jumpTitle">
        <form method="dialog" class="jump-card">
          <div class="jump-head">
            <h2 id="jumpTitle" data-i18n="ui.jump.title">Jump to question</h2>
            <button id="jumpClose" class="jump-close" type="button" aria-label="Close jump dialog" data-i18n-aria-label="ui.aria.closeJumpDialog">
              <svg class="icon" aria-hidden="true"><use href="#tabler-x"></use></svg>
            </button>
          </div>
          <label for="jumpInput" data-i18n="ui.jump.questionNumber">Question number</label>
          <div class="jump-input-row">
            <input id="jumpInput" type="number" min="1" step="1" inputmode="numeric" />
            <button id="jumpGo" type="submit" data-i18n="ui.action.go">Go</button>
          </div>
          <div class="jump-shortcuts" aria-label="Quick jumps" data-i18n-aria-label="ui.aria.quickJumps">
            <button type="button" data-jump="first" data-i18n="ui.jump.first">First</button>
            <button type="button" data-jump="middle" data-i18n="ui.jump.middle">Middle</button>
            <button type="button" data-jump="last" data-i18n="ui.jump.last">Last</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="./app.js?v=md3-ai-icon"></script>
  </body>
</html>
