<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <base href="../" />
    <title>LiD // Trainer Design</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="tabler-filter" viewBox="0 0 24 24">
        <path d="M4 4h16l-6 7v5l-4 3v-8z"></path>
      </symbol>
      <symbol id="tabler-adjustments-horizontal" viewBox="0 0 24 24">
        <path d="M4 6h7"></path>
        <path d="M15 6h5"></path>
        <path d="M12 4v4"></path>
        <path d="M4 12h3"></path>
        <path d="M11 12h9"></path>
        <path d="M8 10v4"></path>
        <path d="M4 18h9"></path>
        <path d="M17 18h3"></path>
        <path d="M14 16v4"></path>
      </symbol>
      <symbol id="tabler-arrows-shuffle" viewBox="0 0 24 24">
        <path d="M18 4l3 3l-3 3"></path>
        <path d="M18 20l3 -3l-3 -3"></path>
        <path d="M3 7h3a5 5 0 0 1 5 5a5 5 0 0 0 5 5h5"></path>
        <path d="M21 7h-5a4.98 4.98 0 0 0 -4 2"></path>
        <path d="M3 17h3a4.98 4.98 0 0 0 4 -2"></path>
      </symbol>
      <symbol id="tabler-arrow-left" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
        <path d="M5 12l6 6"></path>
        <path d="M5 12l6 -6"></path>
      </symbol>
      <symbol id="tabler-arrow-right" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
        <path d="M13 18l6 -6"></path>
        <path d="M13 6l6 6"></path>
      </symbol>
      <symbol id="tabler-star" viewBox="0 0 24 24">
        <path d="M12 17.75l-6.172 3.245l1.179 -6.873l-4.993 -4.867l6.9 -1.003l3.086 -6.252l3.086 6.252l6.9 1.003l-4.993 4.867l1.179 6.873z"></path>
      </symbol>
      <symbol id="tabler-sparkle-2" viewBox="0 0 24 24">
        <path d="M12 3l2.15 5.85l5.85 2.15l-5.85 2.15l-2.15 5.85l-2.15 -5.85l-5.85 -2.15l5.85 -2.15z"></path>
      </symbol>
      <symbol id="tabler-book" viewBox="0 0 24 24">
        <path d="M3 19a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6a9 9 0 0 1 9 0a9 9 0 0 1 9 0"></path>
        <path d="M3 6v13"></path>
        <path d="M12 6v13"></path>
        <path d="M21 6v13"></path>
      </symbol>
      <symbol id="tabler-minus" viewBox="0 0 24 24">
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="tabler-list-check" viewBox="0 0 24 24">
        <path d="M11 6h9"></path>
        <path d="M11 12h9"></path>
        <path d="M11 18h9"></path>
        <path d="M4 6l1 1l3 -3"></path>
        <path d="M4 12l1 1l3 -3"></path>
        <path d="M4 18l1 1l3 -3"></path>
      </symbol>
      <symbol id="tabler-settings" viewBox="0 0 24 24">
        <path d="M10.325 4.317a1.724 1.724 0 0 0 3.35 0a1.724 1.724 0 0 1 2.573 -1.066a1.724 1.724 0 0 0 2.438 2.438a1.724 1.724 0 0 1 1.066 2.573a1.724 1.724 0 0 0 0 3.35a1.724 1.724 0 0 1 -1.066 2.573a1.724 1.724 0 0 0 -2.438 2.438a1.724 1.724 0 0 1 -2.573 1.066a1.724 1.724 0 0 0 -3.35 0a1.724 1.724 0 0 1 -2.573 1.066a1.724 1.724 0 0 0 -2.438 -2.438a1.724 1.724 0 0 1 -1.066 -2.573a1.724 1.724 0 0 0 0 -3.35a1.724 1.724 0 0 1 1.066 -2.573a1.724 1.724 0 0 0 2.438 -2.438a1.724 1.724 0 0 1 2.573 -1.066"></path>
        <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"></path>
      </symbol>
      <symbol id="tabler-device-desktop" viewBox="0 0 24 24">
        <path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"></path>
        <path d="M8 21h8"></path>
        <path d="M12 16v5"></path>
      </symbol>
      <symbol id="tabler-sun" viewBox="0 0 24 24">
        <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path>
        <path d="M3 12h1"></path>
        <path d="M20 12h1"></path>
        <path d="M12 3v1"></path>
        <path d="M12 20v1"></path>
        <path d="M5.6 5.6l.7 .7"></path>
        <path d="M17.7 17.7l.7 .7"></path>
        <path d="M18.4 5.6l-.7 .7"></path>
        <path d="M6.3 17.7l-.7 .7"></path>
      </symbol>
      <symbol id="tabler-moon" viewBox="0 0 24 24">
        <path d="M12 3c.132 0 .263 .003 .393 .009a7.5 7.5 0 0 0 7.598 10.598a9 9 0 1 1 -7.991 -10.607z"></path>
      </symbol>
      <symbol id="tabler-check" viewBox="0 0 24 24">
        <path d="M5 12l5 5l10 -10"></path>
      </symbol>
      <symbol id="tabler-circle-check" viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0 -20" fill="currentColor" stroke="none"></path>
        <path d="M7.5 12.5l3 3l6 -7" stroke="#fff"></path>
      </symbol>
      <symbol id="tabler-x" viewBox="0 0 24 24">
        <path d="M18 6l-12 12"></path>
        <path d="M6 6l12 12"></path>
      </symbol>
    </svg>
    <main class="bp-app" aria-live="polite">
      <header class="bp-top">
        <span class="brand">
          <span class="flag" aria-hidden="true"></span>
        </span>
        <div class="bp-top-actions">
          <button id="filterButton" class="bp-filter-toggle" type="button" aria-label="Toggle filters" aria-expanded="false" aria-controls="filterBar">
            <svg class="icon" aria-hidden="true"><use href="#tabler-filter"></use></svg>
            <span id="filterButtonLabel">All</span>
          </button>
          <button id="shuffleButton" class="bp-shuffle-toggle" type="button" aria-pressed="false" aria-label="Shuffle" title="Shuffle deck">
            <svg class="icon" aria-hidden="true"><use href="#tabler-arrows-shuffle"></use></svg>
          </button>
          <span class="bp-mode" role="group" aria-label="Mode">
            <button id="learnMode" type="button" aria-pressed="true">Learn</button>
            <button id="testMode" type="button" aria-pressed="false">Test</button>
          </span>
        </div>
      </header>

      <section id="filterBar" class="bp-pills-bar" aria-label="Review panel" tabindex="-1">
        <div class="panel-tabs" role="tablist" aria-label="Review panel">
          <button id="filtersTab" type="button" role="tab" aria-selected="true" aria-controls="filtersPane">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-adjustments-horizontal"></use></svg>
            <span class="tab-label">Filters</span>
          </button>
          <button id="knownTab" type="button" role="tab" aria-selected="false" aria-controls="knownPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-list-check"></use></svg>
            <span class="tab-label">Mastered</span>
          </button>
          <button id="testConfigTab" type="button" role="tab" aria-selected="false" aria-controls="testConfigPane" tabindex="-1">
            <svg class="icon tab-icon" aria-hidden="true"><use href="#tabler-settings"></use></svg>
            <span class="tab-label">Config</span>
          </button>
        </div>
        <div id="filtersPane" class="panel-pane" role="tabpanel" aria-labelledby="filtersTab">
          <div id="categoryPills" class="pills"></div>
        </div>
        <div id="knownPane" class="panel-pane" role="tabpanel" aria-labelledby="knownTab" hidden>
          <div id="knownSummary" class="known-summary"></div>
          <div id="knownList" class="known-list"></div>
        </div>
        <div id="testConfigPane" class="panel-pane" role="tabpanel" aria-labelledby="testConfigTab" hidden>
          <div class="test-config">
            <div class="config-section">
              <label for="testSizeInput">Questions per test</label>
              <div class="test-size-control">
                <button id="testSizeMinus" type="button" aria-label="Decrease test count">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-minus"></use></svg>
                </button>
                <input id="testSizeInput" type="number" min="1" max="310" step="1" inputmode="numeric" aria-label="Questions per test" />
                <button id="testSizePlus" type="button" aria-label="Increase test count">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-plus"></use></svg>
                </button>
              </div>
              <div id="testSizeMeta" class="test-size-meta"></div>
            </div>
            <div class="config-section">
              <div class="config-label">Theme</div>
              <div class="theme-control" role="group" aria-label="Theme preference">
                <button id="themeSystem" type="button" data-theme-choice="system" aria-pressed="true">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-device-desktop"></use></svg>
                  System
                </button>
                <button id="themeLight" type="button" data-theme-choice="light" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-sun"></use></svg>
                  Light
                </button>
                <button id="themeDark" type="button" data-theme-choice="dark" aria-pressed="false">
                  <svg class="icon" aria-hidden="true"><use href="#tabler-moon"></use></svg>
                  Dark
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="bp-track" role="progressbar" aria-label="Question progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div id="progressFill" class="fill"></div>
      </div>

      <section id="card" class="bp-card" aria-busy="false">
        <div class="bp-q-label">
          <span id="questionTag" class="tag">FRAGE 001</span>
          <span id="categoryLabel">Alle Kategorien</span>
          <span id="knownTag" class="known-tag" hidden><svg class="icon" aria-hidden="true"><use href="#tabler-check"></use></svg> Mastered</span>
          <span class="grow"></span>
          <span id="feedback" class="bp-feedback" hidden></span>
          <span id="knownCount" class="bp-known" hidden><svg class="icon check" aria-hidden="true"><use href="#tabler-check"></use></svg> 0</span>
          <button id="progressText" class="progress" type="button" aria-label="Jump to question">01<span class="pct">/310</span></button>
        </div>

        <div id="loadingState" class="bp-loading" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <h1 id="questionText" class="bp-q">Loading...</h1>
        <p id="questionTranslation" class="bp-q-en"></p>
        <img id="questionImage" class="bp-image" alt="Official question image" />

        <ul id="answers" class="bp-answers"></ul>

        <div id="lockedHint" class="bp-locked" hidden>— answer to reveal explanation &amp; keywords —</div>
      </section>

      <div id="emptyState" class="bp-empty" hidden>
        <svg class="icon" aria-hidden="true"><use href="#tabler-book"></use></svg>
        <div class="big">No cards here</div>
        <div>Try another category or reset mastered cards</div>
      </div>

      <div id="studyDock" class="bp-study-dock" role="region" aria-label="Study help" hidden>
        <button
          id="studyHandle"
          class="bp-study-handle"
          type="button"
          aria-label="Collapse study help"
          aria-expanded="true"
          aria-controls="studyContent"
        ></button>
        <div id="studyContent" class="bp-study-content">
          <p id="hintText" class="bp-hint"></p>
          <div id="keywordList" class="bp-kw-list"></div>
        </div>
      </div>

      <div id="snackbar" class="bp-snackbar" role="status" aria-live="polite" hidden>
        <span id="snackbarText"></span>
        <button id="snackbarAction" type="button" hidden></button>
      </div>

      <nav class="bp-nav" aria-label="Card navigation">
        <button id="prevButton" type="button" aria-label="Previous">
          <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-left"></use></svg> Prev
        </button>
        <button id="knownButton" class="known-btn" type="button"><svg class="icon" aria-hidden="true"><use href="#tabler-star"></use></svg> Mark as mastered</button>
        <button id="nextButton" type="button">
          Next <svg class="icon arrow" aria-hidden="true"><use href="#tabler-arrow-right"></use></svg>
        </button>
      </nav>

      <dialog id="jumpDialog" class="bp-jump-dialog" aria-labelledby="jumpTitle">
        <form method="dialog" class="jump-card">
          <div class="jump-head">
            <h2 id="jumpTitle">Jump to question</h2>
            <button id="jumpClose" class="jump-close" type="button" aria-label="Close jump dialog">
              <svg class="icon" aria-hidden="true"><use href="#tabler-x"></use></svg>
            </button>
          </div>
          <label for="jumpInput">Question number</label>
          <div class="jump-input-row">
            <input id="jumpInput" type="number" min="1" step="1" inputmode="numeric" />
            <button id="jumpGo" type="submit">Go</button>
          </div>
          <div class="jump-shortcuts" aria-label="Quick jumps">
            <button type="button" data-jump="first">First</button>
            <button type="button" data-jump="middle">Middle</button>
            <button type="button" data-jump="last">Last</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="design/trainer-design-data.js"></script>
  </body>
</html>
